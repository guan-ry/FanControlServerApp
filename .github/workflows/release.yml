name: CI/CD - Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Verify frontend output
        run: |
          if [[ ! -f "backend/web/index.html" ]]; then
            echo "错误: 未找到 backend/web/index.html"
            exit 1
          fi

      - name: Install fnpack
        run: |
          curl -L -o fnpack "https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64"
          chmod +x fnpack
          sudo mv fnpack /usr/local/bin/fnpack
          fnpack --help

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # --- 构建 amd64 后端 ---
      - name: Build Backend (amd64)
        run: |
          mkdir -p app/server
          cd backend
          go mod tidy
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags '-s -w' -o ../app/server/fancontrolserver .

      # 备份 config 和 manifest（manifest 在项目根目录）
      - name: Backup UI config and manifest
        run: |
          cp app/ui/config app/ui/config.bak
          cp manifest manifest.bak

      # --- 打包 amd64 ---
      - name: Build amd64 URL Version
        run: |
          cp app/ui/config.bak app/ui/config
          cp manifest.bak manifest   # platform = x86
          fnpack build
          mkdir -p dist
          mv *.fpk "dist/FanControlServer-${{ steps.get_version.outputs.VERSION }}-linux-amd64-url.fpk"

      - name: Build amd64 Iframe Version
        run: |
          cp manifest.bak manifest   # platform = x86
          sed -i 's/"type": "url"/"type": "iframe"/' app/ui/config
          fnpack build
          mv *.fpk "dist/FanControlServer-${{ steps.get_version.outputs.VERSION }}-linux-amd64-iframe.fpk"

      # --- 构建 arm64 后端 ---
      - name: Build Backend (arm64)
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags '-s -w' -o ../app/server/fancontrolserver .

      # --- 打包 arm64（platform 设为 arm） ---
      - name: Build arm64 URL Version
        run: |
          cp app/ui/config.bak app/ui/config   # url 模式
          cp manifest.bak manifest
          sed -i 's/^platform\s*=.*/platform = arm/' manifest
          fnpack build
          mv *.fpk "dist/FanControlServer-${{ steps.get_version.outputs.VERSION }}-linux-arm64-url.fpk"

      - name: Build arm64 Iframe Version
        run: |
          cp manifest.bak manifest
          sed -i 's/^platform\s*=.*/platform = arm/' manifest
          sed -i 's/"type": "url"/"type": "iframe"/' app/ui/config
          fnpack build
          mv *.fpk "dist/FanControlServer-${{ steps.get_version.outputs.VERSION }}-linux-arm64-iframe.fpk"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.fpk
          generate_release_notes: true