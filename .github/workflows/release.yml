name: CI/CD - Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }} - ${{ matrix.ui }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            fnpack_url: fnpack-1.2.1-linux-amd64
          - arch: arm64
            goarch: arm64
            fnpack_url: fnpack-1.2.1-linux-arm64
        ui: [url, iframe]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Verify frontend output
        run: |
          if [[ ! -f "backend/web/index.html" ]]; then
            echo "错误: 未找到 backend/web/index.html"
            exit 1
          fi

      - name: Build Backend (${{ matrix.arch }})
        run: |
          mkdir -p app/server
          cd backend
          go mod tidy
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0             go build -trimpath -ldflags '-s -w'             -o ../app/server/fancontrolserver .

      - name: Install fnpack (${{ matrix.arch }})
        run: |
          curl -L -o fnpack "https://static2.fnnas.com/fnpack/${{ matrix.fnpack_url }}"
          chmod +x fnpack
          sudo mv fnpack /usr/local/bin/fnpack
          fnpack --help

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Set UI type (${{ matrix.ui }})
        run: |
          if [[ "${{ matrix.ui }}" == "iframe" ]]; then
            sed -i 's/"type": "url"/"type": "iframe"/' app/ui/config
          fi
          cat app/ui/config

      - name: Build FPK
        run: |
          fnpack build
          mkdir -p dist
          mv *.fpk "dist/FanControlServer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.ui }}-${{ matrix.arch }}.fpk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-${{ matrix.ui }}-${{ matrix.arch }}
          path: dist/*.fpk

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: fpk-*
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.fpk
          generate_release_notes: true
